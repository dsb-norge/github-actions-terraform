name: "Create terraform validation summary"
description: |
  Create comment to be added to pull request with summary of validation results and last 65k characters
  of terraform plan output (maximum comment length is 65536 characters).
author: "Peder Schmedling"
inputs:
  environment-name:
    description: Name of the current deployment environment.
  plan-console-file:
    description: Path of file with plan output captured from the console.
    required: false
    default: ""
  plan-txt-output-file:
    description: Path of file with plan output generated by terraform itself.
    required: false
    default: ""
  status-init:
    description: Outcome of init step.
    required: true
  status-fmt:
    description: Outcome of fmt step.
    required: true
  status-validate:
    description: Outcome of validate step.
    required: true
  status-lint:
    description: Outcome of lint step.
    required: true
  status-plan:
    description: Outcome of plan step.
    required: true
  include-plan-details:
    description: Whether to include plan details in the summary.
    required: false
    default: "false"
  plan-count-add:
    description: Number of resources to be added.
    required: false
    default: "N/A"
  plan-count-change:
    description: Number of resources to be changed.
    required: false
    default: "N/A"
  plan-count-destroy:
    description: Number of resources to be destroyed.
    required: false
    default: "N/A"
  plan-count-import:
    description: Number of resources to be imported.
    required: false
    default: "N/A"
  plan-count-move:
    description: Number of resources to be moved.
    required: false
    default: "N/A"
  plan-count-remove:
    description: Number of resources to be removed.
    required: false
    default: "N/A"
outputs:
  prefix:
    description: Validation summary prefix string.
    value: ${{ steps.create-validation-summary.outputs.prefix }}
  summary:
    description: Validation summary content string.
    value: ${{ steps.create-validation-summary.outputs.summary }}
runs:
  using: "composite"
  steps:
    - id: create-validation-summary
      shell: bash
      env:
        PLAN_CONSOLE_FILE: ${{ inputs.plan-console-file }}
        PLAN_OUT_FILE: ${{ inputs.plan-txt-output-file }}
        STATUS_INIT: ${{ inputs.status-init }}
        STATUS_FMT: ${{ inputs.status-fmt }}
        STATUS_VALIDATE: ${{ inputs.status-validate }}
        STATUS_LINT: ${{ inputs.status-lint }}
        STATUS_PLAN: ${{ inputs.status-plan }}
        PLAN_DETAILS_ENABLED: ${{ inputs.include-plan-details }}
        COUNT_ADD: ${{ inputs.plan-count-add }}
        COUNT_CHANGE: ${{ inputs.plan-count-change }}
        COUNT_DESTROY: ${{ inputs.plan-count-destroy }}
        COUNT_IMPORT: ${{ inputs.plan-count-import }}
        COUNT_MOVE: ${{ inputs.plan-count-move }}
        COUNT_REMOVE: ${{ inputs.plan-count-remove }}
      run: |
        # Build pull request comment

        set -o allexport; source "${{ github.action_path }}/helpers.sh"; set +o allexport;

        log-info "creating pull request comment ..."
        COMMENT_PREFIX='### Terraform validation summary for environment: `${{ inputs.environment-name }}`'

        # don't touch the indenting here
        COMMENT_CONTENT="${COMMENT_PREFIX}
        |  | Step | Result |
        |:---:|---|---|
        | ⚙️ | Initialization | $([ "${STATUS_INIT}" == 'success' ] && echo "\`${STATUS_INIT}\`" || echo "<kbd>${STATUS_INIT}</kbd>") |
        | 🖌 | Format and Style | $([ "${STATUS_FMT}" == 'success' ] && echo "\`${STATUS_FMT}\`" || echo "<kbd>${STATUS_FMT}</kbd>") |
        | ✔ | Validate | $([ "${STATUS_VALIDATE}" == 'success' ] && echo "\`${STATUS_VALIDATE}\`" || echo "<kbd>${STATUS_VALIDATE}</kbd>") |
        | 🧹 | TFLint | $([ "${STATUS_LINT}" == 'success' ] && echo "\`${STATUS_LINT}\`" || echo "<kbd>${STATUS_LINT}</kbd>") |
        | 📖 | Plan | $([ "${STATUS_PLAN}" == 'success' ] && echo "\`${STATUS_PLAN}\`" || echo "<kbd>${STATUS_PLAN}</kbd>") |"

        # add plan details if possible
        if [ "${PLAN_DETAILS_ENABLED}" == 'true' ]; then

          # don't touch the indenting here
          COMMENT_CONTENT="${COMMENT_CONTENT}
        | 📊 | Plan Details | <span title=\"Resources to be added\">\`💫 ${COUNT_ADD}\` add</span><br><span title=\"Resources to be changed\">\`🛠️ ${COUNT_CHANGE}\` change</span><br><span title=\"Resources to be destroyed\">\`💥 ${COUNT_DESTROY}\` destroy</span>"

          if [ "${COUNT_MOVE}" != '0' ]; then
            COMMENT_CONTENT="${COMMENT_CONTENT}<br><span title=\"Resources to be moved\">\`🔀 ${COUNT_MOVE}\` move</span>"
          fi

          if [ "${COUNT_IMPORT}" != '0' ]; then
            COMMENT_CONTENT="${COMMENT_CONTENT}<br><span title=\"Resources to be imported\">\`📥 ${COUNT_IMPORT}\` import</span>"
          fi

          if [ "${COUNT_REMOVE}" != '0' ]; then
            COMMENT_CONTENT="${COMMENT_CONTENT}<br><span title=\"Resources to be removed\">\`⛓️‍💥 ${COUNT_REMOVE}\` remove</span>"
          fi

          # end of table row
          COMMENT_CONTENT="${COMMENT_CONTENT} |"
        fi

        # Check if PR can be merged based on plan outcome
        if [ "${STATUS_PLAN}" == 'success' ]; then
          if [ "${COUNT_DESTROY}" != '0' ] || [ "${COUNT_REMOVE}" != '0' ] || [ "${COUNT_ADD}" != '0' ] || [ "${COUNT_CHANGE}" != '0' ]  ; then
            log-info "This PR can not be merged automatically as the Terraform plan includes destructive changes."
            set-output 'can_automerge' "false"
          else
            set-output 'can_automerge' "true"
          fi
        fi

        # look for plan output
        PLAN_OUT=""
        if [ -f "${PLAN_OUT_FILE}" ]; then

          # prefer the plan output generated by terraform itself
          PLAN_OUT=$(cat "${PLAN_OUT_FILE}")
        elif [ -f "${PLAN_CONSOLE_FILE}" ]; then

          # fall back to the captured console output
          PLAN_OUT=$(cat "${PLAN_CONSOLE_FILE}")

          # remove state refresh output
          PLAN_OUT=$(echo "${PLAN_OUT}" | sed -n '/Terraform used the selected providers to generate the following execution/,$p')
        fi

        # add plan output to comment if available
        if [ -n "${PLAN_OUT}" ]; then
          # Cap plan output at 65k characters, to fit within GitHub comment limits
          PLAN_OUT=$(echo "${PLAN_OUT}" | tail -c 65000 )

          # don't touch the indenting here
          COMMENT_CONTENT="${COMMENT_CONTENT}

        <details><summary>Show Plan (last 65k characters)</summary>

        \`\`\`terraform
        ${PLAN_OUT}
        \`\`\`
        </details>"
        else
          # don't touch the indenting here
          COMMENT_CONTENT="${COMMENT_CONTENT}

        Plan not available 🤷‍♀️"
        fi

        COMMENT_CONTENT="${COMMENT_CONTENT}

        *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${GITHUB_WORKFLOW}\`*"

        log-info "Final validation summary prefix: ${COMMENT_PREFIX}"
        log-multiline "Final validation summary " "${COMMENT_CONTENT}"

        set-output 'prefix' "${COMMENT_PREFIX}"
        set-multiline-output 'summary' "${COMMENT_CONTENT}"
