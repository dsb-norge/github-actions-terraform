name: "Create terraform validation summary"
description: |
  Create comment to be added to pull request with summary of validation results and last 65k characters
  of terraform plan output (maximum comment length is 65536 characters).
author: "Peder Schmedling"
inputs:
  environment-name:
    description: Name of the current deployment environment.
  plan-console-file:
    description: Path of file with plan output captured from the console.
    required: false
    default: ""
  plan-txt-output-file:
    description: Path of file with plan output generated by terraform itself.
    required: false
    default: ""
  status-init:
    description: Outcome of init step.
    required: true
  status-fmt:
    description: Outcome of fmt step.
    required: true
  status-validate:
    description: Outcome of validate step.
    required: true
  status-lint:
    description: Outcome of lint step.
    required: true
  status-plan:
    description: Outcome of plan step.
    required: true
  include-plan-details:
    description: Whether to include plan details in the summary.
    required: false
    default: "false"
  plan-count-add:
    description: Number of resources to be added.
    required: false
    default: "N/A"
  plan-count-change:
    description: Number of resources to be changed.
    required: false
    default: "N/A"
  plan-count-destroy:
    description: Number of resources to be destroyed.
    required: false
    default: "N/A"
  plan-count-import:
    description: Number of resources to be imported.
    required: false
    default: "N/A"
  plan-count-move:
    description: Number of resources to be moved.
    required: false
    default: "N/A"
  plan-count-remove:
    description: Number of resources to be removed.
    required: false
    default: "N/A"
outputs:
  prefix:
    description: Validation summary prefix string.
    value: ${{ steps.create-validation-summary.outputs.prefix }}
  summary:
    description: Validation summary content string.
    value: ${{ steps.create-validation-summary.outputs.summary }}
runs:
  using: "composite"
  steps:
    - id: create-validation-summary
      shell: bash
      env:
        input_environment_name: ${{ inputs.environment-name }}
        input_plan_console_file: ${{ inputs.plan-console-file }}
        input_plan_txt_output_file: ${{ inputs.plan-txt-output-file }}
        input_status_init: ${{ inputs.status-init }}
        input_status_fmt: ${{ inputs.status-fmt }}
        input_status_validate: ${{ inputs.status-validate }}
        input_status_lint: ${{ inputs.status-lint }}
        input_status_plan: ${{ inputs.status-plan }}
        input_include_plan_details: ${{ inputs.include-plan-details }}
        input_plan_count_add: ${{ inputs.plan-count-add }}
        input_plan_count_change: ${{ inputs.plan-count-change }}
        input_plan_count_destroy: ${{ inputs.plan-count-destroy }}
        input_plan_count_import: ${{ inputs.plan-count-import }}
        input_plan_count_move: ${{ inputs.plan-count-move }}
        input_plan_count_remove: ${{ inputs.plan-count-remove }}
        input_job_check_run_id: ${{ job.check_run_id }}
        input_github_actor: ${{ github.actor }}
        input_github_event_name: ${{ github.event_name }}
      run: |
        set -o allexport
        source "${{ github.action_path }}/step_create_validation_summary.sh"
