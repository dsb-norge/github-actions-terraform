name: "Automerge PR if no critical changes found in Terraform plan"
description: |
  This action receive input from the `create-validation-summary` action and automerges the pull request
  if the Terraform plan does not include any destructive changes (i.e. resource deletions or removals) and 
  automerge is enabled in workflow.
author: "Artjoms Laivins"
inputs:
  can-automerge:
    description: Whether the PR can be automerged based on the Terraform plan results.
    required: true
  automerge-enabled:
    description: Whether automerge feature is enabled.
    required: true
  merge-method:
    description: Merge method to use (merge, squash, rebase)
    required: false
    default: rebase
runs:
  using: "composite"
  steps:
    - id: automerge
      if: inputs.can-automerge == 'true' && inputs.automerge-enabled == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -o allexport; source "${{ github.action_path }}/helpers.sh"; set +o allexport;  

        # Authenticate gh CLI with automatic token
        echo "${{ github.token }}" | gh auth login --with-token
        
        # Check GitHub CLI authentication
        if ! gh auth status >/dev/null 2>&1; then
          log-error "GitHub CLI is not authenticated"
          exit 1
        fi

        # Validate we're in a PR context
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          log-error "This action can only run in pull request context"
          exit 1
        fi
        
        log-info "Automerge conditions met, attempting to automerge PR..."
        
        # Get current branch name
        CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        log-info "Current branch is '${CURRENT_BRANCH}'"
        
        # Check if PR exists and is open
        PR_NUMBER="${{ github.event.number }}"
        log-info "Working with PR #${PR_NUMBER}"
        
        # TODO: Uncomment when ready to test PR status checks
        #PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
        #log-info "PR state: $PR_STATE"
        
        #if [ "$PR_STATE" != "OPEN" ]; then
        #  log-error "PR is not in an open state (state: $PR_STATE)"
        #  exit 1
