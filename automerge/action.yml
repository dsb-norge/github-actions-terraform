        # Check if PR is mergeable
        #MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable')
        #log-info "PR mergeable status: $MERGEABLE"
        
        #if [ "$MERGEABLE" = "CONFLICTING" ]; then
        #  log-error "PR has merge conflicts"
        #  exit 1
        #fi
        
        log-info "Authentication and setup completed successfully!"
        log-info "PR Number: ${PR_NUMBER}"
        log-info "Would merge with method: ${{ inputs.merge-method }}"
        
