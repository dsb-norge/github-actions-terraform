name: "Automerge PR if no critical changes found in Terraform plan"
description: |
  This action receive input from the `create-validation-summary` action and automerges the pull request
  if the Terraform plan does not include any destructive changes (i.e. resource deletions or removals) and
  automerge is enabled in workflow.
author: "Artjoms Laivins"
inputs:
  can-automerge:
    description: Whether the PR can be automerged based on the Terraform plan results.
    required: true
  automerge-enabled:
    description: Whether automerge feature is enabled.
    required: true
  github-token:
    description: GitHub token to use for authenticating with GitHub CLI.
    required: false
    default: ${{ github.token }}
runs:
  using: "composite"
  steps:
    - id: is-on-pr
      if: ${{ github.event_name != 'pull_request' }}
      shell: bash
      run: |
        set -o allexport; source "${{ github.action_path }}/helpers.sh"; set +o allexport;
        log-error "This action can only run in pull request context"
        exit 1
    - id: cant-automerge
      if: inputs.can-automerge != 'true' && inputs.automerge-enabled == 'true'
      shell: bash
      run: |
        set -o allexport; source "${{ github.action_path }}/helpers.sh"; set +o allexport;
        log-warn "Automerge conditions not met (can-automerge: ${{ inputs.can-automerge }}), skipping automerge."
    - id: automerge-disabled
      if: inputs.can-automerge == 'true' && inputs.automerge-enabled != 'true'
      shell: bash
      run: |
        set -o allexport; source "${{ github.action_path }}/helpers.sh"; set +o allexport;
        log-info "Automerge is disabled (automerge-enabled: ${{ inputs.automerge-enabled }}), skipping automerge."
    - id: automerge
      if: inputs.can-automerge == 'true' && inputs.automerge-enabled == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -o allexport; source "${{ github.action_path }}/helpers.sh"; set +o allexport;

        start-group "GitHub CLI authentication"

        # GitHub CLI will automatically use GITHUB_TOKEN environment variable for authentication
        log-info "GitHub CLI will use GITHUB_TOKEN environment variable for authentication"

        # Check GitHub CLI authentication (this should work with GITHUB_TOKEN env var)
        log-info "Testing GitHub CLI authentication..."
        if gh auth status 2>&1; then
          log-info "GitHub CLI authentication successful"
        else
          log-error "GitHub CLI authentication failed"
          end-group # GitHub CLI authentication
          exit 1
        fi

        end-group # GitHub CLI authentication

        start-group "Branch and PR information"

        # Owner and repo information
        REPO_REF="${{ github.repository }}"
        log-info "Repository: $REPO_REF"

        # Check if PR exists and is open
        PR_NUMBER="${{ github.event.number }}"
        log-info "Working with PR #${PR_NUMBER}"

        PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state' --repo "$REPO_REF")
        log-info "PR state: $PR_STATE"

        if [ "$PR_STATE" != "OPEN" ]; then
          log-error "PR is not in an open state (state: $PR_STATE)"
          end-group # Branch and PR information
          exit 1
        fi

        # Check if PR is mergeable
        MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable' --repo "$REPO_REF")
        log-info "PR mergeable status: $MERGEABLE"

        if [ "$MERGEABLE" = "CONFLICTING" ]; then
          log-error "PR has merge conflicts"
          end-group # Branch and PR information
          exit 1
        fi

        end-group # Branch and PR information

        start-group "Merge PR #${PR_NUMBER}"

        if gh pr merge "$PR_NUMBER" --admin --rebase --delete-branch --repo "$REPO_REF" 2>&1; then
          log-info "Successfully merged PR"
        else
          EXIT_CODE=$?
          log-error "Failed to merge PR with exit code: $EXIT_CODE"

          # Show additional PR info for debugging
          log-info "PR details for debugging:"
          gh pr view "$PR_NUMBER" --json 'title,state,mergeable,mergeStateStatus,statusCheckRollup' --repo "$REPO_REF"
          end-group # Merge PR
          exit $EXIT_CODE
        fi

        end-group # Merge PR
