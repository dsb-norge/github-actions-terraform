name: "DSB terraform CI/CD workflow"
#
# A requirement for this workflow to run is that the following 'permissions' are granted by the calling workflow:
#   permissions:
#     id-token: write       # required for Azure password-less auth
#     contents: read        # required for actions/checkout
#     pull-requests: write  # required for commenting on PRs
#
# Additionally for the workflow to have access to secrets (required when using the input 'extra-envs-from-secrets-yml'),
# all secrets available to the calling workflow must be passe down to this one by:
#   secrets: inherit
#
on:
  workflow_call:
    inputs:
      environments-yml:
        type: string
        description: |
          Specification of environments to run this terraform workflow and it's stages for. Minimum 1 environment must be specified.

          Type: YAML list (as string) with specifications of environments to execute stages for.
          Example:
            environments-yml: |
              - environment: "dsb-digiros"
              - environment: "dsb-norge"
                url: "https://github.com/dsb-norge"

          Required fields are:
            - environment
                string, name of environment to run terraform for.

          Optional fields are:
            - project-dir
                string, path to a directory to run terraform commands within, the path should be relative to the calling repos root, ex. './envs/dev'.
                note: if this is omitted the workflow will default to use the directory '[repo root]/envs/[workflow input 'environment']'.
            - github-environment
                string, name of the deployment environment in github to run the workflow in context of.
                note: if this is omitted the workflow will default to using deployment environment with name  specified by workflow input 'environment'.
            - url
                string, a url to display in github's deployment environment UI.
            - allow-failing-terraform-operations
                bool, defaults to false, if true: the workflow will not terminate with failure even if job steps fails.
                This parameter allows for ignoring failing results of terraform operations for select environments.
            - runs-on
                string, name of the runner group to run the job on, see the workflow input 'runs-on'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - terraform-version
                string, version of terraform to use, see the workflow input 'terraform-version'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - tflint-version
                string, version of TFLint to use, see the workflow input 'tflint-version'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - format-check-in-root-dir
                bool, whether to perform format check from the root of the repo, see the workflow input 'format-check-in-root-dir'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - add-pr-comment
                bool, whether to add validation summary as comment on PR, see the workflow input 'add-pr-comment'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - goals-yml
                YAML array (as string), steps/stages of the workflow to perform for the given environment, see the workflow input 'goals-yml'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - terraform-init-additional-dirs-yml
                YAML array (as string), additional directories for 'terraform init', see the workflow input 'terraform-init-additional-dirs-yml'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - extra-envs-yml
                YAML objects, make environment variables available, see the workflow input 'extra-envs-yml'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
            - extra-envs-from-secrets-yml
                YAML objects, make environment variables with secrets available, see the workflow input 'extra-envs-from-secrets-yml'.
                note: this is a per environment setting, use the workflow input for a global setting that applies to all environments.
        required: true
      goals-yml:
        type: string
        description: |
          The Terraform "goals", these specify what steps/stages of the workflow that will be performed.
          The goals specified in 'goals-yml' will be used for all environments defined in 'environments-yml' if not explicitly overridden for a given environment specification.

          Available goals are (in order of execution):
            standard goals
              - init
              - format
              - validate
              - lint
              - plan, this causes the 'plan' stage to run. Additional requirements for 'plan' stage to run:
                - The 'init' goal was specified and the 'init' stage was successful.
              - apply, this causes the 'apply' stage to run, deploying the plan from the 'plan' stage. Additional requirements for 'apply' stage to run:
                - The 'plan' goal was specified and the 'plan' stage was successful (which also implies 'init').
                - AND workflow was not called from a pull request. This behavior can be overridden adding the goal 'apply-on-pr'.
                - AND workflow was called from the default branch of the calling repo.
            special goals
              - all, this is the default, a shorthand version for all standard goals.
              - apply-on-pr, specify this to make the 'apply' goal have effect also when the workflow was called from a pull request.
              - destroy-plan, this causes an additional 'plan' stage to run with the terraform flag '-destroy'. Additional requirements for 'plan' stage to run:
                - The 'init' goal was specified and the 'init' stage was successful.
              - destroy, this causes an additional 'apply' stage to run, deploying the plan created as a result of the 'destroy-plan' goal. Additional requirements for 'destroy' stage to run:
                - The 'destroy-plan' goal was specified and the 'plan' stage with the terraform flag '-destroy' was successful (which also implies 'init').
                - AND workflow was not called from a pull request. This behavior can be overridden adding the goal 'destroy-on-pr'.
                - AND workflow was called from the default branch of the calling repo.
              - destroy-on-pr, specify this to make the 'destroy' goal have effect also when the workflow was called from a pull request.

          Type: YAML array (as string).
          Example:
            goals-yml: "[init, format, validate]"

          NOTE: This applies to all environments, for single environment specify this directly in the environment specification.
        required: false
        default: "[all]"
      terraform-init-additional-dirs-yml:
        type: string
        description: |
          Additional directories to include during the 'init' stage. 'terraform init' will be executed within each of these.
          The path should be relative to the calling repos root, ex. './modules/my-module'.

          Type: YAML array (as string).
          Example:
            terraform-init-additional-dirs-yml: |
              - "./main"
              - "./modules/my-module"

          NOTE: This applies to all environments, for single environment specify this directly in the environment specification.
        required: false
        default: ""
      extra-envs-yml:
        type: string
        description: |
          Key value pairs of environment variables to make available to all stages og all environments.

          Type: YAML object:
            key:    env name
            value:  value of env
          Example:
            extra-envs-yml: |
              ARM_USE_OIDC: true

          NOTE: This applies to all environments, for single environment specify this directly in the environment specification.
        required: false
        default: "{}" # empty object
      extra-envs-from-secrets-yml:
        type: string
        description: |
          Key value pairs of environment variables to make available to all stages og all environments.
          The value of the environment variables will be retrieved from github secrets.

          Type: YAML object:
            key:    env name
            value:  secret name to get value from
          Example:
            extra-envs-from-secrets-yml: |
              ARM_CLIENT_ID: NAME_OF_GITHUB_SECRET_WITH_SERVICE_PRINCIPAL_CLIENT_ID
              ARM_SUBSCRIPTION_ID: NAME_OF_GITHUB_SECRET_WITH_AZURE_SUBSCRIPTION_ID

          NOTE: This applies to all environments, for single environment specify this directly in the environment specification.
        required: false
        default: "{}" # empty object
      pr-auto-merge-enabled:
        type: boolean
        description: |
          Whether to enable automatic pull request merging when the workflow is triggered by a pull request event.
          The configuration for automatic pull request merging is further controlled by the input 'pr-auto-merge-from-actors-yml' and 'pr-auto-merge-limits-yml'

          NOTE: This setting applies to all environments, there is no per environment setting for this.
        required: false
        default: false
      pr-auto-merge-from-actors-yml:
        type: string
        description: |
          Configuration for automatic pull request merging. Defines which actors for which automatic merging of PRs is considered.

          Together with the input 'pr-auto-merge-enabled' this controls whether automatic pull request merging is considered when the workflow is triggered by a pull request event.

          When automatic pull request merging is considered, the input 'pr-auto-merge-limits-yml' is used to evaluate if merging should actually be performed.

          Data:
            Type: YAML array (as string) of github actor names that are allowed to have their pull requests automatically merged.
            Default (empty array) means that all actors are allowed.

          NOTE: This setting applies to all environments, there is no per environment setting for this.
        required: false
        default: "[]" # empty array, means all actors allowed
      pr-auto-merge-limits-yml:
        type: string
        description: |
          Configuration for when automatic pull request merging should occur. Defines limits that must be met for automatic merging to be performed.

          The various limits are evaluated against terraform plan output for each environment.

          Only if limits are met for all environments automatic merging be performed. Given that, automatic merging is only considered when the workflow is triggered by a pull request event and the input 'pr-auto-merge-enabled' is set to true and the input 'pr-auto-merge-from-actors-yml' allows the actor.

          How the limits work:
          - For each limit, if the value is set to '-1' that limit is ignored.
          - For each limit, if the value is set to '0' the corresponding count in the terraform plan must be zero.
          - For each limit, if the value is set to a positive integer 'N', the corresponding count in the terraform plan must be less than or equal to 'N'.

          Data:
            Type: YAML object with the following fields (all optional):
              - plan-max-count-add
                  integer, maximum number of resources to be added allowed in the terraform plan for automatic merging to occur.
              - plan-max-count-change
                  integer, maximum number of resources to be changed allowed in the terraform plan for automatic merging to occur.
              - plan-max-count-destroy
                  integer, maximum number of resources to be destroyed allowed in the terraform plan for automatic merging to occur.
              - plan-max-count-import
                  integer, maximum number of resources to be imported allowed in the terraform plan for automatic merging to occur.
              - plan-max-count-move
                  integer, maximum number of resources to be moved allowed in the terraform plan for automatic merging to occur.
              - plan-max-count-remove
                  integer, maximum number of resources to be removed allowed in the terraform plan for automatic merging to occur.
            Default:
              Is to allow non-destructive changes. I.e. only import and move operations allowed, no add/change/destroy/remove.

          NOTE: This applies to all environments, for single environment specify this directly in the environment specification.

          ALSO NOTE: If you specify this input as common for all environments, you must specify all fields. Values can still be overridden per environment.
        required: false
        default: |
          plan-max-count-add: 0
          plan-max-count-change: 0
          plan-max-count-destroy: 0
          plan-max-count-import: -1
          plan-max-count-move: -1
          plan-max-count-remove: 0
      runs-on:
        type: string
        description: |
          The runner group to run jobs on, see https://docs.github.com/en/actions/hosting-your-own-runners/about-self-hosted-runners#about-self-hosted-runners.

          This applies to all environments, if you need to specify this per environment, specify this directly in the environment specification.

          Note: some jobs are 'global' and thus always run on the group specified here, e.g. the 'create-matrix' job and the final 'terraform-conclusion' job.
        required: false
        default: "ubuntu-latest"
      terraform-version:
        type: string
        description: |
          What version of terraform to use for terraform operations.
          The default is to use the 'latest' release, see https://github.com/hashicorp/terraform/releases
          This is passed to the 'hashicorp/setup-terraform' action and thus wildcards and Semver ranges are supported, see https://github.com/hashicorp/setup-terraform#inputs.
        required: false
        default: latest
      tflint-version:
        type: string
        description: |
          What version of TFLint to use during the 'lint' stage.
          The default is to use the 'latest' release, see https://github.com/terraform-linters/tflint/releases
          Wildcards and patterns not supported. Must be 'latest' or explicit version.
        required: false
        default: latest
      format-check-in-root-dir:
        type: boolean
        description: |
          The default behavior is to perform format check using directories:
            1.  Either supplied by terraform, given by the file '[project-dir]/.terraform/modules/modules.json' created during the 'init' stage.
                The advantage to this approach is that any modules declared will implicitly also be checked.
            2.  Or if no 'module.json' was found run format check within '[project-dir]'.
          This behavior can be altered to perform format check recursively from the root of the repo by setting this to 'true'.
        required: false
        default: false
      add-pr-comment:
        type: boolean
        description: |
          The default is to add validation summary as comment on PR if the workflow triggerd by a pull request event.
          Set this to false to avoid a comment being added.
        required: false
        default: true

jobs:
  create-matrix:
    name: Create job matrix
    runs-on: ${{ inputs.runs-on }} # global setting
    defaults:
      run:
        shell: bash
    outputs:
      matrix-json: ${{ steps.create-matrix.outputs.matrix-json }}
    steps:
      - name: "🧹 Clean workspace"
        uses: dsb-norge/directory-recreate@v1
      - name: "⬇ Checkout working branch"
        uses: actions/checkout@v4
      - name: "🎰 Create env matrix"
        id: create-matrix
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/create-tf-vars-matrix@automerge
        with:
          inputs-json: ${{ toJSON(inputs) }}

  terraform-ci-cd:
    name: "Terraform"
    needs: create-matrix
    runs-on: ${{ matrix.vars.runs-on }}
    strategy:
      fail-fast: false # Allow jobs to continue even though one more env(s) fail
      matrix: ${{ fromJSON(needs.create-matrix.outputs.matrix-json) }}
    environment:
      name: ${{ matrix.vars.github-environment }}
      url: ${{ matrix.vars.url }}
    concurrency:
      group: ${{ matrix.vars.github-environment }} # one job at a time for a given environment
      cancel-in-progress: false # do not cancel in progress apply
    defaults:
      run:
        shell: bash
    steps:
      - name: "⬇ Checkout"
        uses: actions/checkout@v4

      - name: "🎰 Export environment variables and secrets"
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/export-env-vars@automerge
        with:
          extra-envs: ${{ toJSON(matrix.vars.extra-envs) }}
          extra-envs-from-secrets: ${{ toJSON(matrix.vars.extra-envs-from-secrets) }}
          secrets-json: ${{ toJSON(secrets) }}

      - name: "🔑 Login to Azure"
        uses: azure/login@v2
        if: env.ARM_TENANT_ID != '' && env.ARM_SUBSCRIPTION_ID != '' && env.ARM_CLIENT_ID != ''
        with:
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          client-id: ${{ env.ARM_CLIENT_ID }}

      - name: "📥 Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.vars.terraform-version }}
          # woraround for extra gibberish in output https://github.com/hashicorp/setup-terraform/issues/20
          terraform_wrapper: false

      - name: "🗄️ Setup Terraform provider plugin cache"
        id: setup-terraform-cache
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/setup-terraform-plugin-cache@automerge

      - name: "📥 Setup TFLint"
        id: setup-tflint
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'lint')
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/setup-tflint@automerge
        with:
          tflint-version: ${{ matrix.vars.tflint-version }}
          working-directory: ${{ matrix.vars.project-dir }}

      - name: "🚀 Cache Terraform provider plugins"
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'init')
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup-terraform-cache.outputs.plugin-cache-directory }}
          key: "terraform-provider-plugin-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', matrix.vars.project-dir)) }}"

      - name: ⚙️ Terraform Init
        id: init
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'init')
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/terraform-init@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
          additional-dirs-json: ${{ toJSON(matrix.vars.terraform-init-additional-dirs) }}
          plugin-cache-directory: ${{ steps.setup-terraform-cache.outputs.plugin-cache-directory }}
        continue-on-error: true # allow job to continue, step outcome is evaluated later

      - name: 🖌 Terraform Format
        id: fmt
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'format')
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/terraform-fmt@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
          format-check-in-root-dir: ${{ matrix.vars.format-check-in-root-dir }}
        continue-on-error: true # allow job to continue, step outcome is evaluated later

      - name: ✔ Terraform Validate
        id: validate
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'validate')
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/terraform-validate@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
        continue-on-error: true # allow job to continue, step outcome is evaluated later

      - name: 🧹 Lint with TFLint
        id: lint
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'lint')
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/lint-with-tflint@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
        continue-on-error: true # allow job to continue, step outcome is evaluated later

      - name: 📖 Terraform Plan
        id: plan
        if: steps.init.outcome == 'success' && ( contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'plan') )
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/terraform-plan@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
          environment-name: ${{ matrix.vars.github-environment }}
        continue-on-error: true # allow job to continue, step outcome is evaluated later

      - name: "🔍 Parse terraform plan"
        id: parse-plan
        if: steps.plan.outcome != 'cancelled' && steps.plan.outcome != 'skipped'
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/parse-terraform-plan@automerge
        with:
          plan-console-file: ${{ steps.plan.outputs.console-output-file }}
        continue-on-error: true # allow job to continue, step outcome is ignored

      - name: 📝 Create validation summary
        id: create-validation-summary
        if: github.event_name == 'pull_request' && matrix.vars.add-pr-comment == 'true'
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/create-validation-summary@automerge
        with:
          environment-name: ${{ matrix.vars.github-environment }}
          plan-txt-output-file: ${{ steps.plan.outputs.txt-output-file }} # created by terraform by parsing the plan file, not available when plan fails
          plan-console-file: ${{ steps.plan.outputs.console-output-file }} # captured from console output, possibly available even if plan fails
          status-init: ${{ steps.init.outcome }}
          status-fmt: ${{ steps.fmt.outcome }}
          status-validate: ${{ steps.validate.outcome }}
          status-lint: ${{ steps.lint.outcome }}
          status-plan: ${{ steps.plan.outcome }}
          # include details when parse step actually returned data
          include-plan-details: ${{ steps.parse-plan.outcome == 'success' }}
          plan-count-add: ${{ steps.parse-plan.outputs.count-add }}
          plan-count-change: ${{ steps.parse-plan.outputs.count-change }}
          plan-count-destroy: ${{ steps.parse-plan.outputs.count-destroy }}
          plan-count-import: ${{ steps.parse-plan.outputs.count-import }}
          plan-count-move: ${{ steps.parse-plan.outputs.count-move }}
          plan-count-remove: ${{ steps.parse-plan.outputs.count-remove }}
        continue-on-error: true # allow job to continue, step outcome is ignored

      - name: 🏷️ Add validation summary as pull request comment
        id: validation-summary-on-pr
        if: steps.create-validation-summary.outcome == 'success'
        uses: dsb-norge/github-actions/ci-cd/comment-on-pr@v2
        with:
          pr-comment-text: ${{ steps.create-validation-summary.outputs.summary }}
          delete-comments-starting-with: ${{ steps.create-validation-summary.outputs.prefix }}
        continue-on-error: true # allow job to continue, step outcome is ignored

      # Terminate the job with 'failure' if any validation check did not succeed.
      # If 'allow-failing-terraform-operations' is 'true' for the environment the job will not terminate.

      - name: "🧐 Validation outcome: ⚙️ Init"
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'init')
        run: |
          if [ ! "${{ steps.init.outcome }}" == 'success' ]; then
            echo "::error title=Init failed::Outcome of terraform init step was '${{ steps.init.outcome }}' for environment '${{ matrix.vars.github-environment }}'!"
            exit 1
          fi
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}
      - name: "🧐 Validation outcome: 🖌 Format"
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'format')
        run: |
          if [ ! "${{ steps.fmt.outcome }}" == 'success' ]; then
            echo "::error title=Format check failed::Outcome of terraform fmt step was '${{ steps.fmt.outcome }}' for environment '${{ matrix.vars.github-environment }}'!"
            exit 1
          fi
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}
      - name: "🧐 Validation outcome: ✔ Validate"
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'validate')
        run: |
          if [ ! "${{ steps.validate.outcome }}" == 'success' ]; then
            echo "::error title=Validate failed::Outcome of terraform validate step was '${{ steps.validate.outcome }}' for environment '${{ matrix.vars.github-environment }}'!"
            exit 1
          fi
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}
      - name: "🧐 Validation outcome: 🧹 TFLint"
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'lint')
        run: |
          if [ ! "${{ steps.lint.outcome }}" == 'success' ]; then
            echo "::error title=Lint failed::Outcome of TFLint step was '${{ steps.lint.outcome }}' for environment '${{ matrix.vars.github-environment }}'!"
            exit 1
          fi
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}
      - name: "🧐 Validation outcome: 📖 Plan"
        if: contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'plan')
        run: |
          if [ ! "${{ steps.plan.outcome }}" == 'success' ]; then
            echo "::error title=Plan failed::Outcome of terraform plan step was '${{ steps.plan.outcome }}' for environment '${{ matrix.vars.github-environment }}'!"
            exit 1
          fi
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}

      - name: 🐙 Terraform Apply
        id: apply
        # Run step when:
        #   - plan succeeded AND:
        #     1. one of the goals [all, apply]
        #        AND push or manual on default branch
        #     2. goal 'apply-on-pr'
        #        AND pull request to default branch
        if: |
          steps.plan.outcome == 'success'
          && (
            ( ( contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'apply') )
              && ( github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' )
              && matrix.vars.caller-repo-is-on-default-branch == 'true'
            ) || (
              contains(matrix.vars.goals, 'apply-on-pr')
              && github.event_name == 'pull_request'
              && github.base_ref == matrix.vars.caller-repo-default-branch
          ) )
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/terraform-apply@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
          terraform-plan-file: ${{ steps.plan.outputs.terraform-plan-file }}
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}

      - name: ☠📖 Terraform Destroy Plan
        id: destroy-plan
        if: |
          steps.init.outcome == 'success'
          && contains(matrix.vars.goals, 'destroy-plan')
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/terraform-plan@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
          environment-name: "${{ matrix.vars.github-environment }}-destroy"
          extra-plan-args: -destroy
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}

      - name: "☠🔍 Parse Terraform Destroy plan"
        id: parse-destroy-plan
        if: steps.destroy-plan.outcome != 'cancelled' && steps.destroy-plan.outcome != 'skipped'
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/parse-terraform-plan@automerge
        with:
          plan-console-file: ${{ steps.destroy-plan.outputs.console-output-file }}
        continue-on-error: true # allow job to continue, step outcome is ignored

      - name: ☠ Terraform Destroy
        id: destroy
        # Run step when:
        #   - destroy plan succeeded AND:
        #     1. goal 'destroy'
        #        AND push or manual on default branch
        #     2. goal 'destroy-on-pr'
        #        AND pull request to default branch
        if: |
          steps.destroy-plan.outcome == 'success'
          && (
            ( contains(matrix.vars.goals, 'destroy')
              && ( github.event_name == 'push' || github.event_name == 'workflow_dispatch' )
              && matrix.vars.caller-repo-is-on-default-branch == 'true'
            ) || (
              contains(matrix.vars.goals, 'destroy-on-pr')
              && github.event_name == 'pull_request'
              && github.base_ref == matrix.vars.caller-repo-default-branch
          ) )
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/terraform-apply@automerge
        with:
          working-directory: ${{ matrix.vars.project-dir }}
          terraform-plan-file: ${{ steps.destroy-plan.outputs.terraform-plan-file }}
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}

      # save evaluation to be used later by the automerge job
      - name: "⚖️ Evaluate PR automerge eligibility"
        id: evaluate-automerge
        if: github.event_name == 'pull_request' && matrix.vars.pr-auto-merge-enabled == 'true'
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/evaluate-automerge-eligibility@automerge
        with:
          environment-name: ${{ matrix.vars.github-environment }}
          pr-auto-merge-limits-json: ${{ toJSON(matrix.vars.pr-auto-merge-limits) }}
          pr-auto-merge-from-actors-json: ${{ toJSON(matrix.vars.pr-auto-merge-from-actors) }}
          plan-shouldve-been-created: ${{ contains(matrix.vars.goals, 'all') || contains(matrix.vars.goals, 'plan') }}
          plan-was-created: ${{ steps.plan.outcome == 'success' }}
          performing-apply-on-pr: ${{ contains(matrix.vars.goals, 'apply-on-pr') }}
          apply-on-pr-succeeded: ${{ steps.apply.outcome == 'success' }}
          plan-count-add: ${{ steps.parse-plan.outputs.count-add }}
          plan-count-change: ${{ steps.parse-plan.outputs.count-change }}
          plan-count-destroy: ${{ steps.parse-plan.outputs.count-destroy }}
          plan-count-import: ${{ steps.parse-plan.outputs.count-import }}
          plan-count-move: ${{ steps.parse-plan.outputs.count-move }}
          plan-count-remove: ${{ steps.parse-plan.outputs.count-remove }}
          destroy-plan-shouldve-been-created: ${{ contains(matrix.vars.goals, 'destroy-plan') }}
          destroy-plan-was-created: ${{ steps.destroy-plan.outcome == 'success' }}
          performing-destroy-on-pr: ${{ contains(matrix.vars.goals, 'destroy-on-pr') }}
          destroy-on-pr-succeeded: ${{ steps.destroy.outcome == 'success' }}
          destroy-plan-count-add: ${{ steps.parse-destroy-plan.outputs.count-add }}
          destroy-plan-count-change: ${{ steps.parse-destroy-plan.outputs.count-change }}
          destroy-plan-count-destroy: ${{ steps.parse-destroy-plan.outputs.count-destroy }}
          destroy-plan-count-import: ${{ steps.parse-destroy-plan.outputs.count-import }}
          destroy-plan-count-move: ${{ steps.parse-destroy-plan.outputs.count-move }}
          destroy-plan-count-remove: ${{ steps.parse-destroy-plan.outputs.count-remove }}
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}

      - name: "📦 Upload PR automerge evaluation result"
        id: upload-automerge-evaluation
        if: steps.evaluate-automerge.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: auto-merge-evaluation-result-${{ matrix.vars.github-environment }}
          path: ${{ steps.evaluate-automerge.outputs.result-json-file }}
        # do not terminate if configured to ignore, fromJSON ensures bool
        continue-on-error: ${{ fromJSON(matrix.vars.allow-failing-terraform-operations) }}

  # create a global result indicating if workflow steps succeeded or not,
  # handy for branch protection rules
  conclusion:
    if: always()
    name: "Terraform conclusion"
    needs: [create-matrix, terraform-ci-cd]
    runs-on: ${{ inputs.runs-on }} # global setting
    defaults:
      run:
        shell: bash
    steps:
      - run: exit 1
        # for explanation of '>-' below see https://stackoverflow.com/a/67532120/4907315
        # job 'result': possible values are 'success', 'failure', 'cancelled', or 'skipped'
        if: >-
          ${{
               contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
          }}

  automerge:
    if: |
      needs.conclusion.result == 'success'
      && github.event_name == 'pull_request'
      && inputs.pr-auto-merge-enabled == true
    name: "Automerge PR"
    needs: [terraform-ci-cd, conclusion]
    runs-on: ${{ inputs.runs-on }} # global setting
    defaults:
      run:
        shell: bash
    steps:
      - id: download-automerge-evaluations
        name: "📥 Download PR automerge evaluation results"
        uses: actions/download-artifact@v4
        with:
          pattern: auto-merge-evaluation-result-*
          merge-multiple: true
      - name: "🔍 Evaluate PR automerge eligibility across all environments"
        id: evaluate-automerge
        run: |
          echo "📋 Automerge evaluation per environment:"

          # Check if any evaluation files exist
          #   nullglob ensures that if no files match the pattern, the array is empty
          shopt -s nullglob
          files=(auto-merge-evaluation-result-*.json)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "❌ No automerge evaluation files found"
            echo "should-auto-merge=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          should_auto_merge=true
          for file in "${files[@]}"; do
            echo "::group::Contents of $file"
            cat "$file"
            echo "::endgroup::"

            is_eligible=$(jq -r '.is_eligible // empty' "$file")
            environment=$(jq -r '.environment // empty' "$file")

            if [[ -z "$is_eligible" ]]; then
              should_auto_merge=false
              echo "❌ File '$file' is missing 'is_eligible' field"
            elif [[ -z "$environment" ]]; then
              should_auto_merge=false
              echo "❌ File '$file' is missing 'environment' field"
            elif [[ "$is_eligible" != "true" ]]; then
              should_auto_merge=false
              echo "❌ Environment '$environment' is not eligible for automerge"
            else
              echo "✅ Environment '$environment' is eligible for automerge"
            fi
          done

          echo ""
          if [[ "$should_auto_merge" == "true" ]]; then
            echo "✅ All environments can be automerged"
          else
            echo "❌ At least one environment cannot be automerged"
          fi
          echo "should-auto-merge=$should_auto_merge" >> $GITHUB_OUTPUT
      - name: "🎫 Create GitHub App token"
        id: app-token
        if: steps.evaluate-automerge.outputs.should-auto-merge == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: "2746453" # dsb-infra-pr-merger, TODO: change this to an input
          private-key: ${{ secrets.PRIVATE_KEY }} # TODO: key vault or input
          permission-contents: write
          permission-pull-requests: write
      - name: "🤖 Automerge PR if no critical changes found in Terraform plan"
        id: automerge
        if: steps.evaluate-automerge.outputs.should-auto-merge == 'true'
        # TODO revert to @v0
        uses: dsb-norge/github-actions-terraform/automerge@automerge
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          can-automerge: false # TODO change implementation, false for testing
          automerge-enabled: true # TODO change implementation
